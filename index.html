<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bakery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>Bakery</h1>
    <p>Tu casa de pastelería</p>
  </header>

  <nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
    <a href="#">Reseñas</a>
    <a href="#">Contacto</a>
  </nav>

  <main>
    <h2>Productos destacados</h2>

    <section class="productos">
      <div class="tarjeta-producto">
        <div class="imagen-producto">🍪</div>
        <h3>Galletitas</h3>
        <p>Deliciosas galletitas horneadas en el día.</p>
      </div>

      <div class="tarjeta-producto">
        <div class="imagen-producto">🎂</div>
        <h3>Tortas</h3>
        <p>Para cumpleaños y otras ocasiones.</p>
      </div>

      <div class="tarjeta-producto">
        <div class="imagen-producto">🥧</div>
        <h3>Tartas</h3>
        <p>Para tener algo dulce cada día.</p>
      </div>

      <div class="formulario">
        <h1>Contacto</h1>
        
        <form action="https://formspree.io/f/xdajypeb" method="POST">

          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required>

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email" required>

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="5" required></textarea>

          <button type="submit">Enviar</button>

        </form>

      </div>
    </section>

  </main>

  <footer>
    <p>© 2026 Bakery SA - Todos los derechos reservados</p>
  </footer>

</body>
</html>
